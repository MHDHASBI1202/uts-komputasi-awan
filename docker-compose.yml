services:
  db:
    image: mysql:8.0
    # ... (settingan lainnya tetap sama)
  
  wordpress:
    depends_on:
      - db
    image: wordpress:latest
    # --- TAMBAHKAN BARIS DI BAWAH INI ---
    command: >
      sh -c "
      echo '--- HASIL COMMAND TUGAS UTS ---';
      echo 'a. uname -a:'; uname -a;
      echo 'b. ip a:'; ip a;
      echo 'c. apachectl -v:'; apachectl -v;
      echo 'd. mysql -V:'; mysql -V;
      echo '---------------------------------';
      /usr/local/bin/docker-php-entrypoint apache2-foreground"
    # ------------------------------------
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: hasbi_user
      WORDPRESS_DB_PASSWORD: password_hasbi
      WORDPRESS_DB_NAME: wordpress
